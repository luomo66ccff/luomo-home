<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">Luomo Cloud service orbit passes</title>
  <desc id="desc">Original neon service access passes arranged like a constellation network.</desc>
  <defs>
    <linearGradient id="pass" x1="140" x2="1070" y1="90" y2="650" gradientUnits="userSpaceOnUse">
      <stop stop-color="#22d3ee"/>
      <stop offset=".45" stop-color="#a78bfa"/>
      <stop offset=".74" stop-color="#f472b6"/>
      <stop offset="1" stop-color="#fde68a"/>
    </linearGradient>
    <radialGradient id="back" cx="50%" cy="40%" r="72%">
      <stop offset="0" stop-color="#123a57"/>
      <stop offset=".55" stop-color="#07111f"/>
      <stop offset="1" stop-color="#020617"/>
    </radialGradient>
    <filter id="glow" x="-25%" y="-25%" width="150%" height="150%">
      <feGaussianBlur stdDeviation="7" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="1200" height="720" rx="40" fill="url(#back)"/>
  <g opacity=".35" stroke="url(#pass)" stroke-width="3" fill="none" filter="url(#glow)">
